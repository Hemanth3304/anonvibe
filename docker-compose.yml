version: '3.9'

services:
  # ─── Node.js Backend ─────────────────────────────────────────────
  # ─── Node.js Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sw-backend
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - sw-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis (queues, sessions, pub/sub) ───────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sw-redis
    restart: unless-stopped
    # Use volatile-lru to prevent session eviction under pressure
    # Add password from environment
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-sw_redis_secret}
      --appendonly yes 
      --maxmemory 256mb 
      --maxmemory-policy volatile-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sw_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sw-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── PostgreSQL (reports, analytics, moderation) ─────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       strangerworld
      POSTGRES_USER:     ${POSTGRES_USER:-sw_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sw_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sw_user} -d strangerworld"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sw-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── TURN Server (WebRTC NAT traversal) ──────────────────────────
  coturn:
    image: coturn/coturn:latest
    container_name: sw-coturn
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp" # Limited relay range for bridge mode
    volumes:
      - ./docker/turnserver.conf:/etc/coturn/turnserver.conf
    command: -c /etc/coturn/turnserver.conf
    networks:
      - sw-network

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./docker/certbot/www:/var/www/certbot:ro
      - ./docker/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - sw-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Certbot (SSL Automation) ────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: sw-certbot
    volumes:
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  redis-data:
  postgres-data:

networks:
  sw-network:
    driver: bridge
