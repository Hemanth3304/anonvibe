# render.yaml — Render.com full stack config for AnonVibe
# Push this file to GitHub root, then go to render.com → "New Blueprint"

services:
  # ── Backend ──
  - type: web
    name: anonvibe-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # IMPORTANT: Add these manually in Render dashboard:
      # FRONTEND_URL, REDIS_URL, ADMIN_PASSWORD

  # ── Frontend ──
  - type: web
    name: anonvibe-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: anonvibe-backend
          envVarKey: RENDER_EXTERNAL_URL
