# Coturn configuration for WebRTC
listening-port=3478
tls-listening-port=5349

# Use long-term credentials
lt-cred-mech
user-quota=100
total-quota=0

# Secret for authentication (must match TURN_SECRET in .env)
# static-auth-secret=your_secret

realm=yourdomain.com

# IPs to allow
# IMPORTANT: Change this to YOUR_SERVER_PUBLIC_IP for production
# If behind NAT, use: external-ip=PUBLIC_IP/PRIVATE_IP
external-ip=YOUR_SERVER_PUBLIC_IP

# Port range for relay (must match docker-compose.yml)
min-port=49152
max-port=49200

# Monitoring
# prometheus
cli-password=secret

# Log settings
log-file=/var/log/turn.log
simple-log
